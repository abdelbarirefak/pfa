services:
  - type: web
    name: academicconf-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: academicconf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: CORS_ORIGIN
        value: https://academicconf.vercel.app
      - key: RENDER
        value: "true"

databases:
  - name: academicconf-db
    plan: free
    region: frankfurt
